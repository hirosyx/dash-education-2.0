
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌎 Dash Education - Prática de Idiomas</title>
    <style>
        /* ==================== VARIÁVEIS DE COR ==================== */
        :root {
            --primary: #DC2626;
            --primary-dark: #B91C1C;
            --primary-light: #F87171;
            --secondary: #1F2937;
            --secondary-light: #374151;
            --dark: #000000;
            --darker: #0A0A0A;
            --white: #FFFFFF;
            --gray: #9CA3AF;
            --gray-dark: #4B5563;
            --gray-light: #1F2937;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--darker);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ==================== LAYOUT ==================== */
        .language-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ==================== HEADER DO MÓDULO ==================== */
        .language-header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--secondary) 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-light);
            position: relative;
            overflow: hidden;
        }

        .language-header::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .language-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .language-header p {
            color: var(--gray);
            max-width: 600px;
        }

        /* ==================== SELETOR DE IDIOMA ==================== */
        .language-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .language-option {
            flex: 1;
            background: var(--secondary);
            border: 2px solid var(--gray-light);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .language-option:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .language-option.active {
            border-color: var(--primary);
            background: rgba(220, 38, 38, 0.1);
        }

        .language-option .flag {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .language-option h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .language-option p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* ==================== SISTEMA DE ESTÁGIOS ==================== */
        .stages-container {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-light);
        }

        .stages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .stages-header h2 {
            font-size: 1.3rem;
        }

        .stages-progress {
            display: flex;
            justify-content: space-between;
            position: relative;
            padding: 0 20px;
        }

        .stages-progress::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 60px;
            right: 60px;
            height: 4px;
            background: var(--gray-light);
            border-radius: 2px;
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .stage-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--secondary);
            border: 3px solid var(--gray-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .stage.active .stage-icon {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
        }

        .stage.completed .stage-icon {
            border-color: var(--success);
            background: var(--success);
        }

        .stage-label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stage-desc {
            font-size: 0.8rem;
            color: var(--gray);
            text-align: center;
            max-width: 120px;
        }

        /* ==================== CENÁRIOS ==================== */
        .scenarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .scenario-card {
            background: var(--secondary);
            border: 2px solid var(--gray-light);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .scenario-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .scenario-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .scenario-card:hover::before {
            transform: scaleX(1);
        }

        .scenario-card.active {
            border-color: var(--primary);
            background: rgba(220, 38, 38, 0.1);
        }

        .scenario-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .scenario-card h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .scenario-card p {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .scenario-difficulty {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .scenario-difficulty.easy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .scenario-difficulty.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .scenario-difficulty.hard {
            background: rgba(220, 38, 38, 0.2);
            color: var(--primary);
        }

        /* ==================== CHAT DE CONVERSA ==================== */
        .chat-area {
            background: var(--secondary);
            border-radius: 20px;
            border: 1px solid var(--gray-light);
            overflow: hidden;
        }

        .chat-area-header {
            background: var(--dark);
            padding: 20px 25px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-area-header h3 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .chat-area-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--darker);
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: var(--secondary);
            border: 1px solid var(--gray-light);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message.system {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
            text-align: center;
            align-self: center;
            max-width: 90%;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 1rem;
            vertical-align: middle;
        }

        .message.user .message-avatar {
            background: rgba(255,255,255,0.2);
            margin-right: 0;
            margin-left: 10px;
        }

        .message-content {
            display: inline;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 8px;
            display: block;
        }

        /* ==================== ÁUDIO E VOZ ==================== */
        .voice-controls {
            background: var(--secondary);
            padding: 20px 25px;
            border-top: 1px solid var(--gray-light);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .voice-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .voice-btn.listen {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
        }

        .voice-btn.listen:hover {
            transform: scale(1.1);
        }

        .voice-btn.listen.recording {
            animation: recording 1s infinite;
        }

        @keyframes recording {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
        }

        .voice-btn.secondary {
            background: var(--secondary-light);
            color: var(--white);
            border: 1px solid var(--gray-light);
        }

        .voice-btn.secondary:hover {
            background: var(--gray-light);
            border-color: var(--primary);
        }

        .voice-input {
            flex: 1;
            min-width: 200px;
        }

        .voice-input input {
            width: 100%;
            padding: 16px 20px;
            background: var(--darker);
            border: 2px solid var(--gray-light);
            border-radius: 30px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .voice-input input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            padding: 16px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }

        /* ==================== FEEDBACK DE PRONÚNCIA ==================== */
        .pronunciation-feedback {
            background: var(--darker);
            border: 1px solid var(--gray-light);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .pronunciation-feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pronunciation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .pronunciation-header h4 {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pronunciation-score {
            font-size: 2rem;
            font-weight: 700;
        }

        .pronunciation-score.excellent { color: var(--success); }
        .pronunciation-score.good { color: var(--accent-blue); }
        .pronunciation-score.needs-work { color: var(--warning); }
        .pronunciation-score.poor { color: var(--danger); }

        .pronunciation-details {
            display: grid;
            gap: 15px;
        }

        .pronunciation-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: var(--secondary);
            border-radius: 10px;
        }

        .pronunciation-item.correct {
            border-left: 3px solid var(--success);
        }

        .pronunciation-item.incorrect {
            border-left: 3px solid var(--danger);
        }

        .pronunciation-item .word {
            font-weight: 600;
            min-width: 100px;
        }

        .pronunciation-item .phonetic {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .pronunciation-item .feedback {
            flex: 1;
            font-size: 0.9rem;
        }

        .pronunciation-item .suggestion {
            color: var(--primary);
            font-weight: 500;
        }

        /* ==================== ÁUDIO DO BOT ==================== */
        .audio-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .audio-btn {
